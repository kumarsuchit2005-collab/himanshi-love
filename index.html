<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Himanshi ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: linear-gradient(-45deg,#ff758c,#ff7eb3,#ff4d6d,#ff99ac);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.container {
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    max-width: 400px;
    width: 85%;
    text-align: center;
    position: relative;
    animation: fadeIn 0.7s ease-in;
}

.hidden { display:none; }

@keyframes fadeIn {
    from {opacity:0; transform:scale(0.9);}
    to {opacity:1; transform:scale(1);}
}

h1 { color:#d63384; }
p { color:#555; }

.btn-container {
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

button {
    padding:12px 28px;
    border:none;
    border-radius:50px;
    font-weight:bold;
    cursor:pointer;
}

#yesBtn {
    background:#ff4d6d;
    color:white;
}

#noBtn {
    background:#eee;
    color:#d63384;
    position:relative;
}

.reasons-list {
    text-align:left;
    display:inline-block;
    color:#d63384;
    font-weight:bold;
}

.heart {
    position: fixed;
    color: red;
    animation: fall linear infinite;
    font-size: 20px;
}

@keyframes fall {
    0% { transform: translateY(-10vh); opacity:1; }
    100% { transform: translateY(110vh); opacity:0; }
}

.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    background: red;
    animation: confettiFall 3s linear forwards;
}

@keyframes confettiFall {
    0% { transform: translateY(0); }
    100% { transform: translateY(100vh); }
}
</style>
</head>

<body onclick="playMusic()">

<audio id="valentineMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div id="screen1" class="container">
    <h1>Will you be my Valentine, Himanshi? 💖</h1>
    <p>You are my happiness, my forever, my everything.</p>
    <div class="btn-container">
        <button id="yesBtn" onclick="nextScreen(2)">Yes 🌹</button>
        <button id="noBtn">No 😜</button>
    </div>
</div>

<div id="screen2" class="container hidden">
    <h1>I Knew It 😍</h1>
    <p>You make my world brighter every day.</p>
    <button id="yesBtn" onclick="nextScreen(3)">Next ➡</button>
</div>

<div id="screen3" class="container hidden">
    <h1>Why I Love You 💕</h1>
    <div class="reasons-list">
        <div>💖 Your Smile</div>
        <div>🌸 Your Kind Heart</div>
        <div>💑 Our 1st Feb Proposal</div>
        <div>🏡 You’re My Safe Place</div>
    </div>
    <br><br>
    <button id="yesBtn" onclick="nextScreen(4)">Final Surprise 🎁</button>
</div>

<div id="screen4" class="container hidden">
    <h1>Happy Valentine's Day 💐</h1>
    <p>Himanshi ❤️ Suchit</p>
    <p><b>Forever & Always</b></p>
</div>

<script>
function playMusic(){
    document.getElementById("valentineMusic").play().catch(()=>{});
}

function nextScreen(num){
    document.querySelectorAll('.container').forEach(c=>c.classList.add('hidden'));
    document.getElementById("screen"+num).classList.remove('hidden');
    if(num==2){ launchConfetti(); }
}

const noBtn=document.getElementById("noBtn");

function moveNo(){
    noBtn.style.position="fixed";
    const x=Math.random()*(window.innerWidth-100);
    const y=Math.random()*(window.innerHeight-50);
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",(e)=>{e.preventDefault();moveNo();});

function createHearts(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
}
setInterval(createHearts,300);

function launchConfetti(){
    for(let i=0;i<80;i++){
        const conf=document.createElement("div");
        conf.classList.add("confetti");
        conf.style.left=Math.random()*100+"vw";
        conf.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(conf);
        setTimeout(()=>conf.remove(),3000);
    }
}
</script>

</body>
</html>
