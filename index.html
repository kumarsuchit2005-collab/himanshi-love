<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Himanshi ❤️</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
  text-align:center;
  overflow:hidden;
}

.page{
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{
  display:flex;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:25px;
  font-size:18px;
  margin:15px;
  cursor:pointer;
}

.yes{
  background:white;
  color:black;
}

.no{
  background:red;
  color:white;
  position:absolute;
}
</style>
</head>

<body>

<div class="page active" id="page1">
  <h1>Himanshi ❤️</h1>
  <p>I want to ask you something...</p>
  <button onclick="nextPage()">Next ➜</button>
</div>

<div class="page" id="page2">
  <h1>Will you stay forever with me? 💍</h1>
  <button class="yes" onclick="showFinal()">YES ❤️</button>
  <button class="no" id="noBtn">NO 😜</button>
</div>

<div class="page" id="final">
  <h1>💖 Himanshi & Suchit Forever 💖</h1>
</div>

<script>
function nextPage(){
  document.getElementById("page1").classList.remove("active");
  document.getElementById("page2").classList.add("active");
}

function showFinal(){
  document.getElementById("page2").classList.remove("active");
  document.getElementById("final").classList.add("active");
}

document.getElementById("noBtn").addEventListener("mouseover",function(){
  this.style.left=Math.random()*80+"vw";
  this.style.top=Math.random()*80+"vh";
});
</script>

</body>
</html>
